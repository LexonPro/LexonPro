name: Generate Fire Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate snake (fire theme)
        uses: Platane/snk@v3
        with:
          github_user_name: LexonPro
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-light&color_snake=#ff6b00
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#ff9a00

      - name: Push snake
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
