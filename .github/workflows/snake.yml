name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  - name: Generate snake
  uses: Platane/snk@v3
  with:
    github_user_name: LexonPro
    outputs: |
  dist/github-contribution-grid-snake.svg?palette=github-dark&background=transparent&color_snake=#39d353

      - name: Push snake
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}